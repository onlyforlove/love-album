<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши 2 года вместе ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>С годовщиной, любимая! ❤️</h1>
        <p>Мы вместе уже целых 2 года, и это лучшее время в моей жизни.</p>
    </header>

    <main>
        <h2>Добро пожаловать в наш альбом</h2>
        <p>Здесь собраны наши самые прекрасные, милые и смешные моменты.</p>
        <div class="counter-container">
    <h3>Мы вместе уже:</h3>
    <div class="counter-grid">
        <div class="counter-item">
            <span id="days">00</span>
            <p>дней</p>
        </div>
        <div class="counter-item">
            <span id="hours">00</span>
            <p>часов</p>
        </div>
        <div class="counter-item">
            <span id="minutes">00</span>
            <p>минут</p>
        </div>
        <div class="counter-item">
            <span id="seconds">00</span>
            <p>секунд</p>
        </div>
    </div>
</div>
<div class="slider-container">
    <div class="slider">
        <img src="photo/photo1.jpg" alt="Наше фото 1" class="slide active">
        <img src="photo/photo2.jpg" alt="Наше фото 2" class="slide">
        <img src="photo/photo3.jpg" alt="Наше фото 3" class="slide">
        <img src="photo/photo4.jpg" alt="Наше фото 3" class="slide">
        <img src="photo/photo5.jpg" alt="Наше фото 3" class="slide">
        <img src="photo/photo6.jpg" alt="Наше фото 3" class="slide">
        <img src="photo/photo7.jpg" alt="Наше фото 3" class="slide">
        <img src="photo/photo8.jpg" alt="Наше фото 3" class="slide">
        <img src="photo/photo9.jpg" alt="Наше фото 3" class="slide">
        <img src="photo/photo10.jpg" alt="Наше фото 3" class="slide">
        <img src="photo/photo11.jpg" alt="Наше фото 3" class="slide">
        <img src="photo/photo12.jpg" alt="Наше фото 3" class="slide">
    </div>
    
    <button id="prev-btn" class="slider-btn">❮</button>
    <button id="next-btn" class="slider-btn">❯</button>
</div>
        <!-- Вот сюда мы добавили строчку для будущего текста мема -->
        <p id="meme-text" style="font-weight: bold; color: #d1496a; min-height: 40px; margin-top: 20px;"></p>
        
        <button id="meme-button">Нажми, чтобы вспомнить мем</button>
    </main>

    <footer>
        <p>Сделано с любовью в 2026 году</p>
    </footer>

    <!-- Вот сюда мы подключили JS-файл -->
    <script src="script.js"></script>
</body>
</html>
